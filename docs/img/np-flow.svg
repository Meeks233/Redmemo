<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="aq" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/>
    </marker>
    <style>
      .ttl { font-weight:700; font-size:17px; fill:#0f172a; }
      .col { font-weight:700; font-size:14px; fill:#0f172a; }
      .nd  { font-weight:600; font-size:12px; fill:#0f172a; }
      .sub { font-size:11px; fill:#475569; }
      .tag { font-size:11px; fill:#0284c7; font-weight:600; }
      .lbl { font-size:11px; fill:#64748b; }
    </style>
  </defs>

  <text x="470" y="30" text-anchor="middle" class="ttl">NP Scheduler — Producer / Consumer with single-pacing dispatch</text>
  <text x="470" y="50" text-anchor="middle" class="sub">L1/L2 never call the network directly — every outbound request flows through the NP dispatcher.</text>

  <!-- Producer column -->
  <text x="190" y="86" text-anchor="middle" class="col">Producer (L1 / L2 cycle)</text>
  <line x1="40" y1="95" x2="340" y2="95" stroke="#cbd5e1"/>

  <!-- Dispatcher column -->
  <text x="730" y="86" text-anchor="middle" class="col">NP Dispatcher</text>
  <line x1="560" y1="95" x2="900" y2="95" stroke="#cbd5e1"/>

  <!-- Producer nodes -->
  <g>
    <rect x="100" y="115" width="180" height="55" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="190" y="138" text-anchor="middle" class="nd">IDLE</text>
    <text x="190" y="155" text-anchor="middle" class="sub">wait 12–24 h (random)</text>
  </g>
  <line x1="190" y1="170" x2="190" y2="195" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

  <g>
    <rect x="100" y="195" width="180" height="60" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="190" y="218" text-anchor="middle" class="nd">L1 · listing fetch</text>
    <text x="190" y="235" text-anchor="middle" class="sub">/r/{sub}/hot · cursor `after`</text>
    <text x="190" y="250" text-anchor="middle" class="sub">needsBudget = true</text>
  </g>
  <line x1="190" y1="255" x2="190" y2="280" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

  <g>
    <rect x="100" y="280" width="180" height="60" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="190" y="303" text-anchor="middle" class="nd">L2 · media download</text>
    <text x="190" y="320" text-anchor="middle" class="sub">CDN only (i/v/preview.redd.it)</text>
    <text x="190" y="335" text-anchor="middle" class="sub">needsBudget = false</text>
  </g>

  <!-- Decision: round < 8? -->
  <g>
    <polygon points="190,365 290,405 190,445 90,405" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="190" y="402" text-anchor="middle" class="nd">round &lt; 8 ?</text>
    <text x="190" y="418" text-anchor="middle" class="sub">8 pages = ~200 posts</text>
  </g>
  <line x1="190" y1="340" x2="190" y2="365" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- yes → back to L1 with 15-30min -->
  <path d="M90 405 Q30 405 30 225 Q30 195 95 200" fill="none" stroke="#475569" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="38" y="320" class="lbl" transform="rotate(-90 38,320)">yes · wait 15–30 min</text>

  <!-- no → IDLE -->
  <path d="M190 445 Q190 495 60 495 Q15 495 15 142 Q15 115 95 140" fill="none" stroke="#475569" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="120" y="488" class="lbl">no · big cycle done</text>

  <!-- submit() arrows to dispatcher -->
  <line x1="280" y1="225" x2="560" y2="225" stroke="#0284c7" stroke-width="2" marker-end="url(#aq)"/>
  <text x="420" y="218" text-anchor="middle" class="tag">submit() — blocks</text>
  <line x1="280" y1="310" x2="560" y2="310" stroke="#0284c7" stroke-width="2" marker-end="url(#aq)"/>
  <text x="420" y="303" text-anchor="middle" class="tag">submit() — blocks</text>

  <!-- Dispatcher nodes -->
  <g>
    <rect x="560" y="115" width="280" height="50" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="700" y="138" text-anchor="middle" class="nd">Wait on queue</text>
    <text x="700" y="155" text-anchor="middle" class="sub">single goroutine · FIFO</text>
  </g>
  <line x1="700" y1="165" x2="700" y2="195" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

  <g>
    <polygon points="700,195 820,235 700,275 580,235" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="700" y="232" text-anchor="middle" class="nd">needsBudget?</text>
    <text x="700" y="248" text-anchor="middle" class="sub">yes → waitForBudget()</text>
  </g>
  <line x1="700" y1="275" x2="700" y2="300" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

  <g>
    <polygon points="700,300 820,340 700,380 580,340" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="700" y="337" text-anchor="middle" class="nd">user active &lt; 30 s?</text>
    <text x="700" y="353" text-anchor="middle" class="sub">yes → pause 30 s</text>
  </g>
  <line x1="700" y1="380" x2="700" y2="405" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

  <g>
    <rect x="580" y="405" width="240" height="55" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="700" y="428" text-anchor="middle" class="nd">execute fn(ctx) · close(done)</text>
    <text x="700" y="445" text-anchor="middle" class="sub">producer unblocks, gets result</text>
  </g>

  <!-- loop back to wait with sleep 1-3s -->
  <path d="M820 432 Q900 432 900 140 Q900 115 840 135" fill="none" stroke="#475569" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="908" y="280" class="lbl" transform="rotate(-90 908,280)">sleep 1–3 s (random)</text>

  <!-- Legend footer -->
  <rect x="40" y="495" width="860" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="55" y="515" class="col">Budget table</text>
  <text x="55" y="533" class="lbl">L1 listing → Reddit API (counts against OAuth + HR) · L2 media → CDN (free) · L3 comments → user-triggered only · L4 icons → /about.json, 30-day TTL</text>
</svg>
