<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowFail" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <style>
      .lvl { font-weight:700; font-size:13px; fill:#0f172a; }
      .ttl { font-weight:700; font-size:16px; fill:#0f172a; }
      .sub { font-size:12px; fill:#475569; }
      .lbl { font-size:11px; fill:#64748b; }
      .ok  { fill:#16a34a; font-size:11px; font-weight:600; }
      .fail{ fill:#b45309; font-size:11px; font-weight:600; }
    </style>
  </defs>

  <text x="460" y="32" text-anchor="middle" class="ttl">RedMemo — Four-Level Failover</text>
  <text x="460" y="52" text-anchor="middle" class="sub">Each request walks the chain; degrades only when the previous level cannot serve.</text>

  <!-- Request -->
  <g>
    <rect x="40" y="180" width="120" height="70" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <text x="100" y="210" text-anchor="middle" class="lvl">HTTP request</text>
    <text x="100" y="230" text-anchor="middle" class="sub">user / archive</text>
  </g>

  <!-- L1: Redis -->
  <g>
    <rect x="200" y="170" width="150" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="275" y="195" text-anchor="middle" class="lvl">1. Redis</text>
    <text x="275" y="215" text-anchor="middle" class="sub">HTML cache</text>
    <text x="275" y="232" text-anchor="middle" class="lbl">listing 5 min · post 1 h</text>
    <text x="275" y="250" text-anchor="middle" class="lbl">zero upstream cost</text>
  </g>

  <!-- L2: Reddit API -->
  <g>
    <rect x="390" y="170" width="150" height="90" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="465" y="195" text-anchor="middle" class="lvl">2. Reddit API</text>
    <text x="465" y="215" text-anchor="middle" class="sub">OAuth + HR gate</text>
    <text x="465" y="232" text-anchor="middle" class="lbl">5 s / 30 s / 5 min caps</text>
    <text x="465" y="250" text-anchor="middle" class="lbl">stealth TLS / h2 fp</text>
  </g>

  <!-- L3: Postgres -->
  <g>
    <rect x="580" y="170" width="150" height="90" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="655" y="195" text-anchor="middle" class="lvl">3. PostgreSQL</text>
    <text x="655" y="215" text-anchor="middle" class="sub">permanent archive</text>
    <text x="655" y="232" text-anchor="middle" class="lbl">posts + comments</text>
    <text x="655" y="250" text-anchor="middle" class="lbl">amber banner shown</text>
  </g>

  <!-- L4: fuckreddit -->
  <g>
    <rect x="770" y="170" width="120" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="830" y="195" text-anchor="middle" class="lvl">4. /fuckreddit</text>
    <text x="830" y="215" text-anchor="middle" class="sub">degrade page</text>
    <text x="830" y="232" text-anchor="middle" class="lbl">terminal surface</text>
    <text x="830" y="250" text-anchor="middle" class="lbl">user-clicked only</text>
  </g>

  <!-- horizontal arrows -->
  <line x1="160" y1="215" x2="200" y2="215" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="215" x2="390" y2="215" stroke="#b45309" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowFail)"/>
  <line x1="540" y1="215" x2="580" y2="215" stroke="#b45309" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowFail)"/>
  <line x1="730" y1="215" x2="770" y2="215" stroke="#b45309" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowFail)"/>

  <!-- hit labels (green) above arrows -->
  <text x="180" y="207" text-anchor="middle" class="ok">hit ✓</text>
  <text x="370" y="207" text-anchor="middle" class="fail">miss</text>
  <text x="560" y="207" text-anchor="middle" class="fail">no budget / HR / fail</text>
  <text x="750" y="207" text-anchor="middle" class="fail">user clicks banner</text>

  <!-- return arrows -->
  <path d="M275 260 Q275 330 165 330 L100 330 L100 252" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M465 260 Q465 350 100 350 L100 252" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M655 260 Q655 370 100 370 L100 252" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow)"/>

  <text x="200" y="345" class="ok">200 OK (cache)</text>
  <text x="200" y="365" class="ok">200 OK (live)</text>
  <text x="200" y="385" class="ok">200 OK (archive + banner)</text>

  <!-- footer -->
  <rect x="40" y="405" width="850" height="38" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="55" y="425" class="sub" font-weight="700">HR rate-limit gate</text>
  <text x="55" y="438" class="lbl">three-tier tumbling counters (5 s / 30 s / 5 min) shared via Redis · fails closed when Redis is down · NP traffic counts but is never penalised</text>
</svg>
