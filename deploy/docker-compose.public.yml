# RedMemo — Public-instance profile.
#
# Threat model: exposed to the open internet behind nginx/Caddy with TLS.
# Auth is mandatory (TOTP gate enforced; REDMEMO_AUTH_BYPASS deliberately
# absent), the instance NEVER initiates upstream Reddit calls on its own
# (every page served comes from the local archive — no on-demand upstream
# leak), and /debug is hidden from the world. Discovery is ON: the instance
# advertises its Natural-Prefetch sub list (/np.json, /sitemap.xml, archive
# hub) so people can find it by the subs it mirrors — that's the point of a
# public node. Set the NP list + canonical host below before going live.
#
# Required: an .env file containing
#   PG_PASSWORD=<strong-password>
#   SERVER_SECRET=<long-random-string>
#
# The Server-Secret is the pre-shared key that gates TOTP enrolment; rotate
# it whenever you suspect leakage and run `redmemo --reset-totp` to wipe
# the enrolled second factor.

services:
  redmemo:
    image: ghcr.io/meeks233/redmemo:latest
    # build: ..              # uncomment when building from source
    ports:
      - "8080:8080"           # front this with nginx/Caddy + Let's Encrypt
    environment:
      # ---- Storage (required) ----------------------------------------
      - REDMEMO_POSTGRES_DSN=postgres://redmemo:${PG_PASSWORD:?PG_PASSWORD is required (set it in .env)}@postgres:5432/redmemo?sslmode=disable
      - REDMEMO_REDIS_ADDR=redis:6379
      - REDMEMO_LEGACY_SYNC=false

      # ---- Auth ------------------------------------------------------
      # Public: TOTP gate STRICTLY ENFORCED. The server-secret pre-gates
      # enrolment; one wrong server-secret OR three wrong codes locks the
      # IP out until the next 30s TOTP window.
      - REDMEMO_SERVER_SECRET=${SERVER_SECRET:?SERVER_SECRET is required (set it in .env)}
      # (REDMEMO_AUTH_BYPASS deliberately unset — would open the UI to
      # everyone with network reach. Never set on a public instance.)

      # ---- Debug page ------------------------------------------------
      # OFF: /debug 303-redirects to /settings for everyone.
      - REDMEMO_DEFAULT_ENABLE_DEBUG=off

      # ---- Upstream policy -------------------------------------------
      # NO on-demand upstream calls. Every served page comes from the
      # local archive; missing posts return a friendly 503 from
      # /fuckreddit instead of leaking the visitor's IP / fingerprint
      # to Reddit. Prefetch still runs (it goes through the OAuth
      # session under NP's pacing — a stealthier upstream path).
      - REDMEMO_DEFAULT_DISABLE_INITIATIVE_UPSTREAM_ACCESS=on

      # ---- Homepage --------------------------------------------------
      # The homepage is query-driven and disabled by default (no query set),
      # so `/` redirects to the archive hub — visitors land on what's actually
      # stored locally, with no implicit "default subs" disclosure of operator
      # taste. There is no on/off toggle; to render a feed instead, set a query
      # here (e.g. REDMEMO_DEFAULT_FRONT_PAGE_SUBS=sub:golang+rust) or per
      # account from /settings.

      # ---- Natural Prefetch ------------------------------------------
      # This is what a public instance contributes to the network: the subs
      # it mirrors. Master switch on; fill the crawl list with the subs this
      # instance archives, in the unified search grammar (e.g.
      # "sub:golang+rust+selfhosted") — or set it later from /settings.
      # Whatever ends up here is ADVERTISED to crawlers + aggregators by the
      # SEO surfaces below (/np.json, /sitemap.xml, the archive hub), so people
      # can find this instance by the subs it carries. An empty list means the
      # instance advertises nothing — set it before going live.
      - REDMEMO_PREFETCH_ENABLED=true
      - REDMEMO_DEFAULT_PREFETCH_SUBS=
      # Default crawl depth across every sub: l2+l3 = listings + media +
      # comments. "none"/"l2"/"l3" narrow it; per-sub overrides go in
      # REDMEMO_DEFAULT_PREFETCH_SUB_MODES. See docs/Natural-Prefetch.md.
      - REDMEMO_DEFAULT_PREFETCH_DEFAULT_DEPTH=l2+l3

      # ---- SEO / discovery -------------------------------------------
      # ON by default — decentralized discovery is the point: this lets
      # search engines + aggregators find which instance mirrors which
      # Natural-Prefetch subs (via the /archive hub, /sitemap.xml and the
      # machine-readable /np.json feed — the union of archived + configured
      # NP subs). Set =false only for a PRIVATE instance. canonical_host
      # SHOULD match the public origin so sitemap.xml / np.json /
      # <link rel=canonical> emit absolute URLs — uncomment + set it.
      - REDMEMO_SEO_ALLOW_INDEXING=true
      # - REDMEMO_SEO_CANONICAL_HOST=https://memo.example.com

      # ---- Link previews (unfurl) -----------------------------------
      # Telegram-style preview cards for bare external links in post and
      # comment bodies. Metadata is fetched server-side once and cached;
      # preview images/videos load directly in each viewer's browser
      # (never proxied). Defaults are ON / ON / 8s.
      - REDMEMO_UNFURL_ENABLED=on
      # jina_fallback forwards a link's URL to the r.jina.ai reader for
      # pages a direct OpenGraph crawl can't reach (Cloudflare/anti-bot).
      # That is an off-instance disclosure of which links your archive
      # holds — keep it off on a privacy-strict public box; flip on only
      # if you accept that trade for richer cards. See docs/Link-Preview.md.
      - REDMEMO_UNFURL_JINA_FALLBACK=off
      - REDMEMO_UNFURL_TIMEOUT=8s

      # ---- Trusted reverse proxy ------------------------------------
      # If you front this with nginx/Caddy on the same host, add the
      # proxy's IP/CIDR so the per-IP lockout tracks real client IPs.
      # Without YAML this stays empty (XFF ignored). Set in config.yaml
      # under server.trusted_proxy_cidrs if you need it.
    volumes:
      - media_data:/data/media
      # Optional: mount a config.yaml to pin trusted_proxy_cidrs,
      # hrlimit.* tuning, or static OAuth tokens.
      # - ./config.yaml:/etc/redmemo/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    # No host port binding — Postgres is only reachable inside the compose
    # network.
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=768MB
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: redmemo
      POSTGRES_USER: redmemo
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required (set it in .env)}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmemo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  media_data:
