# https://goreleaser.com — run `goreleaser check` to validate.
version: 2

project_name: redmemo

before:
  hooks:
    - go mod tidy

builds:
  - id: redmemo
    main: ./cmd/redmemo
    binary: redmemo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}
    # Docker-only project: the only binary we need is the linux one that gets
    # baked into the container image. No standalone darwin/windows builds —
    # RedMemo is a compose stack (postgres + redis + redlib), so a lone binary
    # is unusable, and the tarballs only existed to populate a GitHub Release.
    goos:
      - linux
    goarch:
      - amd64
      - arm64

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Do NOT auto-generate a commit changelog: GoReleaser's git/github changelog
# prints each line as "hash: message (Name <email>)", and since the commit
# email is not linked to a GitHub account it leaks the raw address on every
# line. Disable it entirely; the footer's compare link covers the diff.
changelog:
  disable: true

dockers:
  - image_templates:
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile.release
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Self-hosted Reddit privacy proxy with persistent archive"
      - "--label=org.opencontainers.image.source=https://github.com/Meeks233/Redmemo"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0"
  - image_templates:
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile.release
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Self-hosted Reddit privacy proxy with persistent archive"
      - "--label=org.opencontainers.image.source=https://github.com/Meeks233/Redmemo"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0"

docker_manifests:
  - name_template: "ghcr.io/meeks233/redmemo:{{ .Version }}"
    image_templates:
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-amd64"
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-arm64"
  - name_template: "ghcr.io/meeks233/redmemo:v{{ .Major }}"
    image_templates:
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-amd64"
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-arm64"
  - name_template: "ghcr.io/meeks233/redmemo:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-amd64"
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-arm64"
  - name_template: "ghcr.io/meeks233/redmemo:latest"
    image_templates:
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-amd64"
      - "ghcr.io/meeks233/redmemo:{{ .Version }}-arm64"

# No GitHub Release page. Distribution is the GHCR image published by the
# `dockers`/`docker_manifests` stages above; users deploy via docker compose
# (see docs/Quick-Deployment.md). Disabling the release also removes the only
# surface that ever printed commit author emails.
release:
  disable: true
