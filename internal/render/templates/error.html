{{ define "title" }}Error: {{ .Message }}{{ end }}

{{ template "base" . }}

{{ define "content" }}
<div id="error">
	<h1>{{ .Message }}</h1>
	{{ if .Details }}
	<div style="text-align:left; max-width:600px; margin:1em auto; padding:1em; background:#1a1a2e; border-radius:8px; font-size:0.9em;">
		<h4 style="margin-top:0;">Diagnostics</h4>
		<ul style="list-style:none; padding:0; margin:0;">
		{{ range .Details }}
			<li style="padding:0.3em 0; border-bottom:1px solid #333;">{{ . }}</li>
		{{ end }}
		</ul>
	</div>
	{{ end }}
	<h3><a href="https://www.redditstatus.com/">Reddit Status</a></h3>
	<br />
	<h3>Head back <a href="/">home</a>?</h3>
</div>
{{ end }}
