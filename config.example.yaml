server:
  listen: ":8080"
  read_timeout: 30s
  write_timeout: 60s

legacy:
  sync_enabled: true                   # one-time settings sync from old redlib instance
  instance: ""                         # empty = Docker DNS (redlib:8080); set to explicit address to override

postgres:
  dsn: "postgres://redmemo:password@postgres:5432/redmemo?sslmode=disable"
  max_open_conns: 50
  max_idle_conns: 10

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  max_memory_mb: 256

media:
  root_path: "/data/media"
  max_size_gb: 50
  eviction_check_interval: 5m
  eviction_threshold: 0.8              # trigger eviction at 80% capacity

oauth:
  tokens:
    - client_id: "ohXpoqrZYub1kg"
      backend: "mobile_spoof"

ratelimit:
  window_size: 500                     # total budget per window (conservative)
  window_duration: 10m
  safety_buffer: 50                    # reserved for prefetch

prefetch:
  enabled: true
  check_interval: 30s
  subreddits:
    - name: "golang"
      sort: "hot"
      max_pages: 2
      fetch_comments: true
      fetch_media: true
      priority: 10
    - name: "linux"
      sort: "new"
      max_pages: 1
      priority: 5

hrlimit:
  enabled: true
  l1_window: 5s
  l1_threshold: 5
  l2_window: 30s
  l2_threshold: 15
  l3_window: 5m
  l3_threshold: 50

render:
  brand_name: "RedMemo"
  show_archive_badge: true
