# RedMemo configuration.
#
# This file is FULLY OPTIONAL. RedMemo runs on built-in defaults plus
# REDMEMO_* environment variables; only mount this file when you want to
# pin a value that does not have an env-var equivalent (e.g. the SEO
# canonical host, the trusted-proxy CIDR list, a non-default HR-limit
# tuning, or static OAuth tokens). For Docker deployments the recommended
# setup is **env-only** — see README "Configuration" for the full list.
#
# Required env vars (no config-file fallback for these):
#   REDMEMO_POSTGRES_DSN    e.g. postgres://redmemo:pw@postgres:5432/redmemo?sslmode=disable
#   REDMEMO_REDIS_ADDR      e.g. redis:6379
#   REDMEMO_SERVER_SECRET   pre-shared secret gating TOTP enrolment
#
# All settings-page preferences (theme, layout, front_page_subs,
# prefetch_subs, enable_debug, disable_initiative_upstream_access, ...)
# are persisted in Postgres and overrideable via REDMEMO_DEFAULT_<KEY> —
# never declared here. See README "Default user settings" for the table.

server:
  listen: ":8080"
  read_timeout: 30s
  write_timeout: 60s
  # Reverse-proxy CIDRs whose X-Forwarded-For header we trust when deriving
  # the per-request client IP for /settings auth-gate lockout. Leave empty when
  # exposed directly; add the proxy's IP/CIDR ("127.0.0.1/32", "10.0.0.0/8")
  # behind nginx/caddy so lockout tracks real client IPs and not the proxy's.
  trusted_proxy_cidrs: []

legacy:
  sync_enabled: true                   # one-time settings sync from old redlib instance
  instance: ""                         # empty = Docker DNS (redlib:8080); set to explicit address to override

media:
  root_path: "/data/media"
  max_size_gb: 50
  eviction_check_interval: 5m
  eviction_threshold: 0.8              # trigger eviction at 80% capacity

# OAuth tokens are managed entirely in the DB by the token holder, which
# bootstraps an anonymous mobile_spoof session on first start. Declare a
# token here ONLY if you want to pin a specific Reddit client_id at boot;
# leave the whole `oauth` block out otherwise.
#
# oauth:
#   tokens:
#     - client_id: "ohXpoqrZYub1kg"
#       backend: "mobile_spoof"

# Android User-Agent spoofing (mobile_spoof backend).
#
# RedMemo ships a small curated list of recent, verified Reddit Android
# releases as the default. Reddit's own policy discourages a stale/fake
# User-Agent, and an outdated version is itself a detectable fingerprint —
# so it is RECOMMENDED to keep these current via environment variables.
# Look up the latest "Version X/Build Y" on APKMirror's Reddit page.
#
#   REDMEMO_ANDROID_APP_VERSION  Comma-separated "Version YYYY.WW.X/Build NNNNNNN"
#                                entries; one is picked at random per token.
#                                e.g. "Version 2026.07.0/Build 2607141,Version 2026.06.0/Build 2606110"
#   REDMEMO_ANDROID_APP_DATE     A date (YYYY-MM-DD) auto-translated to a version
#                                string + synthesized build number — use this if
#                                you don't want to look up exact codes yourself.
#                                e.g. "2026-02-20". Ignored if APP_VERSION is set.
#   REDMEMO_ANDROID_OS_VERSION   Android major version: "14" (fixed) or "12-15" (range).
#   REDMEMO_ANDROID_USER_AGENT   Full UA string used verbatim — highest priority,
#                                disables all randomization. e.g.
#                                "Reddit/Version 2026.07.0/Build 2607141/Android 14"
#
# Priority for the app version: USER_AGENT > APP_VERSION > APP_DATE > built-in default.

ratelimit:
  window_size: 500                     # total budget per window (conservative)
  window_duration: 10m
  safety_buffer: 50                    # reserved for prefetch

# Prefetch master switch + dispatcher tick. The CRAWL LIST (which subs are
# prefetched) lives in the DB — set it from /settings or via
# REDMEMO_DEFAULT_PREFETCH_SUBS (unified search grammar, e.g. "sub:golang+rust").
prefetch:
  enabled: true
  check_interval: 30s

hrlimit:
  enabled: true
  l1_window: 5s
  l1_threshold: 5
  l2_window: 30s
  l2_threshold: 15
  l3_window: 5m
  l3_threshold: 50

render:
  brand_name: "RedMemo"
  show_archive_badge: true

# SEO controls — off by default. Flip allow_indexing to true on a public
# instance to expose the archive surfaces (the /archive hub + /archive/r/<sub>
# pages) to search engines. When off, /robots.txt returns "Disallow: /",
# /sitemap.xml 404s, and every page keeps a noindex,nofollow meta tag.
#
# canonical_host is the public-facing origin used for absolute URLs inside
# sitemap.xml and <link rel="canonical">. Leave empty to fall back to
# root-relative URLs; set it to your real https origin in production.
seo:
  allow_indexing: false
  canonical_host: ""
