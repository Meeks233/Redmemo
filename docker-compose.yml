services:
  redmemo:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDMEMO_POSTGRES_DSN=postgres://redmemo:${PG_PASSWORD:?PG_PASSWORD is required (set it in .env)}@postgres:5432/redmemo?sslmode=disable
      - REDMEMO_REDIS_ADDR=redis:6379
      - REDMEMO_LEGACY_SYNC=false
      - REDMEMO_SERVER_SECRET=${SERVER_SECRET:?SERVER_SECRET is required (set it in .env)}
    volumes:
      - ./config.yaml:/etc/redmemo/config.yaml:ro
      - media_data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    # No host port binding — Postgres is only reachable inside the compose
    # network. Add a `ports:` mapping locally if you need direct psql access;
    # never publish 5432 to a public host without also tightening the password
    # policy and (ideally) firewalling the port.
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: redmemo
      POSTGRES_USER: redmemo
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required (set it in .env)}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmemo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    # No host port binding — Redis is only reachable inside the compose
    # network. The rate-limit / HR-limit keys here are sensitive (an attacker
    # who can write them can grant themselves unlimited upstream quota), so
    # never expose 6379 to a public host without also enabling requirepass.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  media_data:
