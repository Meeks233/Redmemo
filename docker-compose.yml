services:
  redmemo:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDMEMO_REDLIB_UPSTREAM=http://redlib:8080
      - REDMEMO_POSTGRES_DSN=postgres://redmemo:${PG_PASSWORD:-redmemo_dev}@postgres:5432/redmemo?sslmode=disable
      - REDMEMO_REDIS_ADDR=redis:6379
    volumes:
      - ./config.yaml:/etc/redmemo/config.yaml:ro
      - media_data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: redmemo
      POSTGRES_USER: redmemo
      POSTGRES_PASSWORD: ${PG_PASSWORD:-redmemo_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmemo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redlib:
    image: quay.io/redlib/redlib:latest
    ports:
      - "8081:8080"
    environment:
      - SFW_ONLY=off
      - REDLIB_DEFAULT_THEME=dark
      - REDLIB_DEFAULT_SHOW_NSFW=on
      - REDLIB_DEFAULT_SUBSCRIPTIONS=homelab
      - REDLIB_DEFAULT_REMOVE_DEFAULT_FEEDS=on
      - REDLIB_DEFAULT_USE_HLS=on
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/settings || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  media_data:
