services:
  redmemo:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/redmemo/config.yaml:ro
      - media_data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: redmemo
      POSTGRES_USER: redmemo
      POSTGRES_PASSWORD: ${PG_PASSWORD:-redmemo_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmemo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: uncomment to enable nginx for media X-Accel-Redirect optimization
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - media_data:/data/media:ro
  #   depends_on:
  #     - redmemo
  #   restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  media_data:
