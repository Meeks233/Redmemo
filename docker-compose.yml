# RedMemo — local test profile.
#
# Optimised for rapid iteration on a dev machine: TOTP gate is OFF so curl
# can hit /settings + /debug directly, /debug is exposed, the instance is
# allowed to make on-demand upstream Reddit calls, and Postgres is bound
# to localhost so `psql -h 127.0.0.1` works for ad-hoc inspection. Default
# secrets are inlined so a fresh checkout boots with just `docker compose
# up` — override via .env for any other environment.
#
# DO NOT deploy this file to production. Use deploy/docker-compose.public.yml
# for an internet-facing instance (strict TOTP, no initiative upstream,
# debug off) or deploy/docker-compose.homelab.yml for a Tailnet/LAN box.

services:
  redmemo:
    build: .
    ports:
      - "8080:8080"
    environment:
      # ---- Storage (defaults inlined for one-shot `docker compose up`) ----
      - REDMEMO_POSTGRES_DSN=postgres://redmemo:${PG_PASSWORD:-redmemo}@postgres:5432/redmemo?sslmode=disable
      - REDMEMO_REDIS_ADDR=redis:6379
      - REDMEMO_LEGACY_SYNC=false

      # ---- Auth: BYPASS so curl-driven verification works without TOTP -----
      # AUTH_BYPASS short-circuits the /settings + /debug gate. SERVER_SECRET
      # is therefore optional in this profile — kept here only so legitimate
      # callers can still flip bypass off without missing the secret.
      - REDMEMO_AUTH_BYPASS=on
      - REDMEMO_SERVER_SECRET=${SERVER_SECRET:-test-secret-do-not-use-in-prod}

      # ---- Media cache cap (500 MB for eviction testing) ----------------
      - REDMEMO_MEDIA_MAX_SIZE_GB=0.5

      # ---- Test-friendly defaults --------------------------------------
      - REDMEMO_DEFAULT_ENABLE_DEBUG=on
      - REDMEMO_DEFAULT_DISABLE_INITIATIVE_UPSTREAM_ACCESS=off
      # NSFW: show every post (incl. NSFW subs in archive nav) and never blur.
      - REDMEMO_DEFAULT_SHOW_NSFW=on
      - REDMEMO_DEFAULT_SHOW_LOCAL_NSFW_SUBS=on
      - REDMEMO_DEFAULT_BLUR_NSFW=off
      # Media viewing: a private box trusts its bandwidth, so play longer clips
      # inline (gate at 10 min instead of the conservative 3-min code default)
      # and expand every gallery item in the feed by default.
      - REDMEMO_DEFAULT_LONG_VIDEO_THRESHOLD=10
      - REDMEMO_DEFAULT_SHOW_ALL_GALLERY_MEDIA=on

      # ---- Natural Prefetch: full L1+L2+L3 coverage of r/golang for local ---
      # Default depth is "l2+l3" so the local container exercises the entire
      # visit-like flow (listings + media downloads + comment fetches) out of
      # the box. Override per-sub by appending `<sub>=depth:none|l2|l3|l2+l3`
      # to REDMEMO_DEFAULT_PREFETCH_SUB_MODES, or flip the global default
      # below.
      - REDMEMO_PREFETCH_ENABLED=true
      - REDMEMO_DEFAULT_ENABLE_NATURAL_PREFETCH=on
      - REDMEMO_DEFAULT_PREFETCH_SUBS=sub:golang
      - REDMEMO_DEFAULT_PREFETCH_DEFAULT_DEPTH=l2+l3
      # L3 noise floor: posts with fewer than this many comments are frozen
      # out of L3 (both bind and standalone). 50 is a sane LAN default — it
      # skips drive-by 1-line threads while still covering real discussion.
      # Set 0 to disable. Negative or non-integer → container refuses to start.
      - REDMEMO_DEFAULT_PREFETCH_L3_MIN_COMMENTS=50
      # Initial in-cycle phase scatter ("Start after % of window elapsed") for
      # each L1 bucket on first start. 20 keeps the first fetch comfortably
      # inside the first window without burning it at t=0 — the scheduler
      # rolls uniformly in [0, 20% × cycle period].
      - REDMEMO_DEFAULT_PREFETCH_THRESHOLD=20
    volumes:
      # config.yaml is OPTIONAL — RedMemo runs on defaults + REDMEMO_* env
      # vars. Uncomment when pinning a value that has no env-var equivalent
      # (SEO canonical host, trusted-proxy CIDRs, HR-limit tuning, static
      # OAuth tokens). See config.example.yaml.
      # - ./config.yaml:/etc/redmemo/config.yaml:ro
      - media_data:/data/media
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=768MB
    # Bound to 127.0.0.1 so `psql -h 127.0.0.1 -U redmemo` works for
    # ad-hoc inspection during tests, but NOT exposed to the network.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: redmemo
      POSTGRES_USER: redmemo
      POSTGRES_PASSWORD: ${PG_PASSWORD:-redmemo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmemo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    # Bound to 127.0.0.1 for `redis-cli -h 127.0.0.1` debugging during
    # tests; not exposed to the network.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  redis_data:
  media_data:
