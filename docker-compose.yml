services:
  redmemo:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDMEMO_POSTGRES_DSN=postgres://redmemo:${PG_PASSWORD:-redmemo_dev}@postgres:5432/redmemo?sslmode=disable
      - REDMEMO_REDIS_ADDR=redis:6379
      # Legacy settings sync: auto-discovers redlib via Docker DNS (redlib:8080)
      # To use an external redlib instance instead:
      #   REDMEMO_LEGACY_INSTANCE=192.168.1.100:8080
      # To disable sync entirely:
      #   REDMEMO_LEGACY_SYNC=false
    volumes:
      - ./config.yaml:/etc/redmemo/config.yaml:ro
      - media_data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: redmemo
      POSTGRES_USER: redmemo
      POSTGRES_PASSWORD: ${PG_PASSWORD:-redmemo_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmemo"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: keep a redlib instance for one-time settings migration.
  # RedMemo will auto-sync settings on first startup, then never contact it again.
  # Safe to remove after migration is complete.
  redlib:
    image: quay.io/redlib/redlib:latest
    ports:
      - "8081:8080"
    environment:
      - SFW_ONLY=off
      - REDLIB_DEFAULT_THEME=dark
      - REDLIB_DEFAULT_SHOW_NSFW=on
      - REDLIB_DEFAULT_REMOVE_DEFAULT_FEEDS=on
      - REDLIB_DEFAULT_USE_HLS=on
    profiles:
      - migration
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  media_data:
